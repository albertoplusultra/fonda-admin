<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceder · Fonda Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f1e8;
      font-family: "Inter", "Segoe UI", system-ui, sans-serif;
      color: #1e293b;
    }

    .card {
      background: #fff;
      border: 1px solid #e5e1d8;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(15, 23, 42, 0.10);
      padding: 2.5rem 2rem 2rem;
      width: 100%;
      max-width: 380px;
      text-align: center;
    }

    .logo {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 0.35rem;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #64748b;
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    .btn-google {
      display: inline-flex;
      align-items: center;
      gap: 0.65rem;
      background: #fff;
      color: #374151;
      border: 1.5px solid #d1d5db;
      border-radius: 10px;
      padding: 0.75rem 1.25rem;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
      width: 100%;
      justify-content: center;
    }

    .btn-google:hover {
      border-color: #b0916a;
      box-shadow: 0 2px 8px rgba(176, 145, 106, 0.18);
      background: #fdfaf6;
    }

    .btn-google svg {
      flex-shrink: 0;
    }

    .error-msg {
      margin-top: 1.25rem;
      padding: 0.65rem 0.9rem;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      font-size: 0.8rem;
      color: #b91c1c;
      display: none;
    }

    .error-msg.visible { display: block; }

    footer {
      margin-top: 2rem;
      font-size: 0.72rem;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🏛️</div>
    <h1>Fonda Admin</h1>
    <p class="subtitle">Acceso restringido al equipo de<br>Plus Ultra &amp; La Fonda de los Príncipes.</p>

    <a href="/auth/google" class="btn-google">
      <!-- Google G logo -->
      <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
        <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
        <path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/>
        <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/>
      </svg>
      Entrar con Google
    </a>

    <div class="error-msg" id="errorMsg"></div>

    <footer>Fonda de los Príncipes &copy; 2026</footer>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const err = params.get('error');
    const msgEl = document.getElementById('errorMsg');
    const msgs = {
      domain:    'Tu cuenta no pertenece a un dominio autorizado.',
      cancelled: 'Acceso cancelado. Inténtalo de nuevo.',
      server:    'Error del servidor. Inténtalo en unos minutos.',
    };
    if (err && msgs[err]) {
      msgEl.textContent = msgs[err];
      msgEl.classList.add('visible');
    }
  </script>
</body>
</html>
