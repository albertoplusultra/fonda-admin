<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fonda de los Príncipes — Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f6f2;
      --surface: #ffffff;
      --text: #152133;
      --text-muted: #5e6774;
      --accent: #b08c52;
      --accent-hover: #957342;
      --border: #d8dee7;
      --success: #2f6f4f;
      --error: #af3f3f;
      --radius: 12px;
    }

    body {
      font-family: "Brown", "Avenir Next", "Segoe UI", system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      width: 100%;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: flex-start;
    }

    .brand-logo {
      display: block;
      width: min(280px, 55vw);
      height: auto;
    }

    .app-layout {
      width: 100%;
      display: flex;
      gap: 0;
      flex: 1;
    }

    .sidebar {
      width: 250px;
      background: transparent;
      border-right: 1px solid #e5e9f0;
      padding: 1.1rem 0.9rem;
    }

    .sidebar-title {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #6b7280;
      margin: 0 0.55rem 0.55rem;
    }

    .sidebar-nav {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.45rem;
    }

    .sidebar-item {
      display: block;
      width: 100%;
      color: #3b4656;
      font-size: 0.9rem;
      text-align: left;
      padding: 0.15rem 0;
      font-weight: 400;
    }

    .sidebar-item.active {
      color: #152133;
      font-weight: 500;
    }


    main {
      width: 100%;
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .card {
      width: 100%;
      max-width: 500px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
    }

    .card-title {
      color: var(--text);
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
    }

    .card-desc {
      font-size: 0.875rem;
      color: var(--text-muted);
      line-height: 1.5;
      margin-bottom: 1.5rem;
    }

    .drop-zone {
      border: 1.5px dashed #bac5d4;
      border-radius: var(--radius);
      padding: 2.5rem 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
    }

    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--accent);
      background: #fcfaf6;
    }

    .drop-zone.has-file {
      border-color: #4d8468;
      background: #f3f8f5;
      border-style: solid;
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .drop-zone .icon {
      font-size: 2rem;
      margin-bottom: 0.55rem;
      color: var(--accent);
    }

    .drop-zone .label {
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .drop-zone .label strong {
      color: var(--accent);
    }

    .file-info {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-top: 1.25rem;
      padding: 0.75rem 1rem;
      background: #f8f8f6;
      border: 1px solid #e4e8ef;
      border-radius: 8px;
      font-size: 0.85rem;
    }

    .file-info .file-icon { font-size: 1.3rem; }
    .file-info .file-name { flex: 1; font-weight: 500; word-break: break-all; }

    .file-info .remove-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1.1rem;
      padding: 0.25rem;
      border-radius: 4px;
      transition: color 0.15s;
    }

    .file-info .remove-btn:hover { color: var(--error); }

    .actions {
      display: flex;
      gap: 0.75rem;
      margin-top: 0.5rem;
    }

    .btn {
      flex: 1;
      padding: 0.85rem 1.5rem;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .btn-primary {
      background: var(--text);
      color: var(--bg);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .btn-primary:hover:not(:disabled) {
      background: #0f1a2c;
      box-shadow: 0 6px 16px rgba(21, 33, 51, 0.18);
      transform: translateY(-1px);
    }

    .btn-primary:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .status-msg {
      padding: 0.85rem 1rem;
      border-radius: 8px;
      font-size: 0.85rem;
      line-height: 1.5;
      display: none;
    }

    .status-msg.success {
      display: block;
      background: #edf6f1;
      color: #245840;
      border: 1px solid #cae2d6;
    }

    .status-msg.error {
      display: block;
      background: #fbefef;
      color: var(--error);
      border: 1px solid #f0cfcf;
    }

    footer {
      margin-top: auto;
      padding: 1.5rem;
      font-size: 0.75rem;
      color: var(--text-muted);
      text-align: center;
    }

    @media (max-width: 900px) {
      .app-layout {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
    }
  </style>
</head>
<body>

<header>
  <img src="/static/logo_fonda.svg" alt="La Fonda de los Príncipes" class="brand-logo">
</header>

<div class="app-layout">
  <aside class="sidebar">
    <p class="sidebar-title">Administración</p>
    <nav class="sidebar-nav">
      <div class="sidebar-item active">
        <span>Crear cartas de bienvenida</span>
      </div>
    </nav>
  </aside>

  <main>
    <div class="card">
      <h2 class="card-title">Crear cartas de bienvenida</h2>
      <p class="card-desc">
        Sube el excel que has exportado de Prestige PMS.
        Se generará un PDF personalizado por cada huésped y se descargará como ZIP.
      </p>

      <div class="drop-zone" id="dropZone">
        <input type="file" id="fileInput" accept=".xlsx,.xls">
        <div class="icon">📄</div>
        <div class="label">Arrastra tu archivo aquí o <strong>haz clic para seleccionar</strong></div>
      </div>

      <div class="file-info" id="fileInfo" style="display:none">
        <span class="file-icon">📊</span>
        <span class="file-name" id="fileName"></span>
        <button class="remove-btn" id="removeBtn" title="Quitar archivo">&times;</button>
      </div>

      <div class="actions">
        <button class="btn btn-primary" id="publishBtn" disabled>
          <span id="btnText">Publicar cartas</span>
        </button>
      </div>

      <div class="status-msg" id="statusMsg"></div>
    </div>
  </main>
</div>

<footer>Fonda de los Príncipes &copy; 2026</footer>

<script>
  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  const fileInfo = document.getElementById('fileInfo');
  const fileName = document.getElementById('fileName');
  const removeBtn = document.getElementById('removeBtn');
  const publishBtn = document.getElementById('publishBtn');
  const btnText = document.getElementById('btnText');
  const statusMsg = document.getElementById('statusMsg');

  let selectedFile = null;

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    if (e.dataTransfer.files.length) setFile(e.dataTransfer.files[0]);
  });

  fileInput.addEventListener('change', () => {
    if (fileInput.files.length) setFile(fileInput.files[0]);
  });

  removeBtn.addEventListener('click', clearFile);

  function setFile(file) {
    if (!file.name.match(/\.xlsx?$/i)) {
      showStatus('Solo se aceptan archivos Excel (.xlsx)', 'error');
      return;
    }
    selectedFile = file;
    fileName.textContent = file.name;
    fileInfo.style.display = 'flex';
    dropZone.classList.add('has-file');
    publishBtn.disabled = false;
    hideStatus();
  }

  function clearFile() {
    selectedFile = null;
    fileInput.value = '';
    fileInfo.style.display = 'none';
    dropZone.classList.remove('has-file');
    publishBtn.disabled = true;
    hideStatus();
  }

  function showStatus(msg, type) {
    statusMsg.textContent = msg;
    statusMsg.className = 'status-msg ' + type;
    statusMsg.style.marginTop = '1rem';
  }

  function hideStatus() {
    statusMsg.className = 'status-msg';
    statusMsg.style.marginTop = '0';
  }

  function setLoading(loading) {
    publishBtn.disabled = loading;
    if (loading) {
      btnText.innerHTML = '<span class="spinner"></span> Generando…';
    } else {
      btnText.textContent = 'Publicar cartas';
      if (selectedFile) publishBtn.disabled = false;
    }
  }

  publishBtn.addEventListener('click', async () => {
    if (!selectedFile) return;
    setLoading(true);
    hideStatus();

    const formData = new FormData();
    formData.append('file', selectedFile);

    try {
      const res = await fetch('/api/generar-cartas', { method: 'POST', body: formData });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error || err.detail || 'Error desconocido');
      }

      const count = res.headers.get('X-Cartas-Count') || '?';
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'Cartas_Bienvenida.zip';
      a.click();
      URL.revokeObjectURL(url);

      showStatus(`Se generaron ${count} carta(s) correctamente. Descarga iniciada.`, 'success');
      clearFile();
    } catch (err) {
      showStatus(err.message, 'error');
    } finally {
      setLoading(false);
    }
  });
</script>

</body>
</html>
