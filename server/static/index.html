<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/static/favicon.ico" sizes="any">
  <title>Fonda de los Príncipes — Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f6f2;
      --surface: #ffffff;
      --text: #152133;
      --text-muted: #5e6774;
      --accent: #b08c52;
      --accent-hover: #957342;
      --border: #d8dee7;
      --success: #2f6f4f;
      --error: #af3f3f;
      --radius: 12px;
    }

    body {
      font-family: "Brown", "Avenir Next", "Segoe UI", system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      width: 100%;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: flex-start;
    }

    .brand-logo {
      display: block;
      width: min(280px, 55vw);
      height: auto;
    }

    .app-layout {
      width: 100%;
      display: flex;
      gap: 0;
      flex: 1;
    }

    .sidebar {
      width: 250px;
      background: transparent;
      border-right: 1px solid #e5e9f0;
      padding: 1.1rem 0.9rem;
    }

    .sidebar-title {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #6b7280;
      margin: 0 0.55rem 0.55rem;
    }

    .sidebar-nav {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.45rem;
    }

    .sidebar-item {
      display: block;
      width: 100%;
      color: #3b4656;
      font-size: 0.9rem;
      text-align: left;
      padding: 0.15rem 0;
      font-weight: 400;
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
    }

    .sidebar-item:hover {
      color: var(--accent-hover);
    }

    .sidebar-item.active {
      color: #152133;
      font-weight: 500;
    }

    .view.hidden {
      display: none;
    }


    main {
      width: 100%;
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .card {
      width: 100%;
      max-width: 500px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
    }

    .card.card-wide {
      max-width: 1200px;
    }

    .card-title {
      color: var(--text);
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
    }

    .card-desc {
      font-size: 0.875rem;
      color: var(--text-muted);
      line-height: 1.5;
      margin-bottom: 1.5rem;
    }

    .drop-zone {
      border: 1.5px dashed #bac5d4;
      border-radius: var(--radius);
      padding: 2.5rem 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
    }

    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--accent);
      background: #fcfaf6;
    }

    .drop-zone.has-file {
      border-color: #4d8468;
      background: #f3f8f5;
      border-style: solid;
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .drop-zone .icon {
      font-size: 2rem;
      margin-bottom: 0.55rem;
      color: var(--accent);
    }

    .drop-zone .label {
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .drop-zone .label strong {
      color: var(--accent);
    }

    .file-info {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-top: 1.25rem;
      padding: 0.75rem 1rem;
      background: #f8f8f6;
      border: 1px solid #e4e8ef;
      border-radius: 8px;
      font-size: 0.85rem;
    }

    .file-info .file-icon { font-size: 1.3rem; }
    .file-info .file-name { flex: 1; font-weight: 500; word-break: break-all; }

    .file-info .remove-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1.1rem;
      padding: 0.25rem;
      border-radius: 4px;
      transition: color 0.15s;
    }

    .file-info .remove-btn:hover { color: var(--error); }

    .actions {
      display: flex;
      gap: 0.75rem;
      margin-top: 0.5rem;
    }

    .btn {
      flex: 1;
      padding: 0.85rem 1.5rem;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .btn-primary {
      background: var(--text);
      color: var(--bg);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .btn-primary:hover:not(:disabled) {
      background: #0f1a2c;
      box-shadow: 0 6px 16px rgba(21, 33, 51, 0.18);
      transform: translateY(-1px);
    }

    .btn-primary:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .status-msg {
      padding: 0.85rem 1rem;
      border-radius: 8px;
      font-size: 0.85rem;
      line-height: 1.5;
      display: none;
    }

    .status-msg.success {
      display: block;
      background: #edf6f1;
      color: #245840;
      border: 1px solid #cae2d6;
    }

    .status-msg.error {
      display: block;
      background: #fbefef;
      color: var(--error);
      border: 1px solid #f0cfcf;
    }

    .form-group {
      margin-bottom: 1.1rem;
    }

    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 0.4rem;
      letter-spacing: 0.02em;
    }

    .form-group input[type="text"],
    .form-group input[type="url"],
    .form-group input[type="date"] {
      width: 100%;
      padding: 0.65rem 0.85rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.9rem;
      font-family: inherit;
      color: var(--text);
      background: #fff;
    }

    .form-group textarea {
      width: 100%;
      min-height: 220px;
      padding: 0.65rem 0.85rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.86rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      color: var(--text);
      background: #fff;
      resize: vertical;
      line-height: 1.45;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(176, 140, 82, 0.2);
    }

    .form-group textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(176, 140, 82, 0.2);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    @media (max-width: 520px) {
      .form-row {
        grid-template-columns: 1fr;
      }
    }

    .table-wrap {
      margin-top: 1.25rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: auto;
      max-width: 100%;
      background: #fff;
    }

    .prices-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 980px;
      font-size: 0.8rem;
    }

    .prices-table th,
    .prices-table td {
      border-bottom: 1px solid #edf1f6;
      border-right: 1px solid #edf1f6;
      padding: 0.5rem 0.55rem;
      text-align: center;
      white-space: nowrap;
    }

    .prices-table th:last-child,
    .prices-table td:last-child {
      border-right: none;
    }

    .prices-table thead th {
      position: sticky;
      top: 0;
      background: #f8f9fb;
      z-index: 1;
      font-weight: 600;
      color: #334155;
    }

    .prices-table .hotel-cell {
      text-align: left;
      font-weight: 600;
      color: #1f2937;
      background: #fcfcfd;
      min-width: 260px;
      white-space: normal;
    }

    .prices-table .price-empty {
      color: #94a3b8;
    }

    .prices-table td[data-history] {
      cursor: default;
      position: relative;
    }

    .price-tip {
      position: fixed;
      z-index: 9999;
      pointer-events: none;
      background: #1e293b;
      color: #f1f5f9;
      border-radius: 6px;
      padding: 0;
      font-size: 0.72rem;
      box-shadow: 0 4px 14px rgba(0,0,0,.25);
      white-space: nowrap;
      overflow: hidden;
    }

    .price-tip table {
      border-collapse: collapse;
    }

    .price-tip th,
    .price-tip td {
      padding: 0.25rem 0.5rem;
      text-align: center;
      border: none;
    }

    .price-tip thead th {
      background: #334155;
      color: #94a3b8;
      font-weight: 500;
      font-size: 0.68rem;
      border-bottom: 1px solid #475569;
    }

    .price-tip tbody td {
      font-weight: 600;
      color: #e2e8f0;
      border-right: 1px solid #334155;
    }

    .price-tip tbody td:last-child {
      border-right: none;
    }

    footer {
      margin-top: auto;
      padding: 1.5rem;
      font-size: 0.75rem;
      color: var(--text-muted);
      text-align: center;
    }

    @media (max-width: 900px) {
      .app-layout {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
    }
  </style>
</head>
<body>

<header>
  <img src="/static/logo_fonda.svg" alt="La Fonda de los Príncipes" class="brand-logo">
</header>

<div class="app-layout">
  <aside class="sidebar">
    <p class="sidebar-title">Administración</p>
    <nav class="sidebar-nav">
      <button type="button" class="sidebar-item active" data-nav="cartas" aria-current="page">
        Crear cartas de bienvenida
      </button>
      <button type="button" class="sidebar-item" data-nav="competencia">
        Precios competencia
      </button>
    </nav>
  </aside>

  <main>
    <section class="view view--cartas" id="view-cartas" aria-labelledby="title-cartas" aria-hidden="false">
    <div class="card">
      <h2 class="card-title" id="title-cartas">Crear cartas de bienvenida</h2>
      <p class="card-desc">
        Sube el excel que has exportado de Prestige PMS.
        Se generará un PDF personalizado por cada huésped y se descargará como ZIP.
      </p>

      <div class="drop-zone" id="dropZone">
        <input type="file" id="fileInput" accept=".xlsx,.xls">
        <div class="icon">📄</div>
        <div class="label">Arrastra tu archivo aquí o <strong>haz clic para seleccionar</strong></div>
      </div>

      <div class="file-info" id="fileInfo" style="display:none">
        <span class="file-icon">📊</span>
        <span class="file-name" id="fileName"></span>
        <button class="remove-btn" id="removeBtn" title="Quitar archivo">&times;</button>
      </div>

      <div class="actions">
        <button class="btn btn-primary" id="publishBtn" disabled>
          <span id="btnText">Publicar cartas</span>
        </button>
      </div>

      <div class="status-msg" id="statusMsg"></div>
    </div>
    </section>

    <section class="view view--competencia hidden" id="view-competencia" aria-labelledby="title-competencia" aria-hidden="true">
    <div class="card card-wide">
      <h2 class="card-title" id="title-competencia">Precios competencia</h2>

      <div id="pricesTableWrap" class="table-wrap" style="display:none"></div>
      <div class="status-msg" id="scrapeStatusMsg"></div>

      <details style="margin-top:1.25rem">
        <summary style="cursor:pointer;font-size:0.85rem;color:var(--text-muted);font-weight:500">Hoteles a analizar</summary>
        <div class="form-group" style="margin-top:0.75rem">
          <textarea id="competitorsInput" spellcheck="false"></textarea>
        </div>
      </details>

      <div class="actions" style="margin-top:0.75rem">
        <button class="btn btn-primary" id="scrapeBtn" type="button">
          <span id="scrapeBtnText">Actualizar tabla</span>
        </button>
      </div>
    </div>
    </section>
  </main>
</div>

<footer>Fonda de los Príncipes &copy; 2026</footer>

<script>
  const viewCartas = document.getElementById('view-cartas');
  const viewCompetencia = document.getElementById('view-competencia');
  const navButtons = document.querySelectorAll('.sidebar-item[data-nav]');

  function showView(name, { updateHash = true } = {}) {
    const isCartas = name === 'cartas';
    viewCartas.classList.toggle('hidden', !isCartas);
    viewCompetencia.classList.toggle('hidden', isCartas);
    viewCartas.setAttribute('aria-hidden', isCartas ? 'false' : 'true');
    viewCompetencia.setAttribute('aria-hidden', isCartas ? 'true' : 'false');

    navButtons.forEach((btn) => {
      const active = btn.dataset.nav === name;
      btn.classList.toggle('active', active);
      if (active) btn.setAttribute('aria-current', 'page');
      else btn.removeAttribute('aria-current');
    });

    if (updateHash && window.location.hash.slice(1) !== name) {
      window.location.hash = name;
    }
    document.title = name === 'competencia'
      ? 'Precios competencia — Fonda de los Príncipes'
      : 'Fonda de los Príncipes — Admin';
  }

  navButtons.forEach((btn) => {
    btn.addEventListener('click', () => showView(btn.dataset.nav));
  });

  window.addEventListener('hashchange', () => {
    const h = window.location.hash.slice(1);
    if (h === 'competencia' || h === 'cartas') {
      showView(h, { updateHash: false });
    }
  });

  (function initViewFromHash() {
    const h = window.location.hash.slice(1);
    if (h === 'competencia') showView('competencia', { updateHash: false });
    else showView('cartas', { updateHash: false });
  })();

  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  const fileInfo = document.getElementById('fileInfo');
  const fileName = document.getElementById('fileName');
  const removeBtn = document.getElementById('removeBtn');
  const publishBtn = document.getElementById('publishBtn');
  const btnText = document.getElementById('btnText');
  const statusMsg = document.getElementById('statusMsg');

  let selectedFile = null;

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    if (e.dataTransfer.files.length) setFile(e.dataTransfer.files[0]);
  });

  fileInput.addEventListener('change', () => {
    if (fileInput.files.length) setFile(fileInput.files[0]);
  });

  removeBtn.addEventListener('click', clearFile);

  function setFile(file) {
    if (!file.name.match(/\.xlsx?$/i)) {
      showStatus('Solo se aceptan archivos Excel (.xlsx)', 'error');
      return;
    }
    selectedFile = file;
    fileName.textContent = file.name;
    fileInfo.style.display = 'flex';
    dropZone.classList.add('has-file');
    publishBtn.disabled = false;
    hideStatus();
  }

  function clearFile() {
    selectedFile = null;
    fileInput.value = '';
    fileInfo.style.display = 'none';
    dropZone.classList.remove('has-file');
    publishBtn.disabled = true;
    hideStatus();
  }

  function showStatus(msg, type) {
    statusMsg.textContent = msg;
    statusMsg.className = 'status-msg ' + type;
    statusMsg.style.marginTop = '1rem';
  }

  function hideStatus() {
    statusMsg.className = 'status-msg';
    statusMsg.style.marginTop = '0';
  }

  function setLoading(loading) {
    publishBtn.disabled = loading;
    if (loading) {
      btnText.innerHTML = '<span class="spinner"></span> Generando…';
    } else {
      btnText.textContent = 'Publicar cartas';
      if (selectedFile) publishBtn.disabled = false;
    }
  }

  publishBtn.addEventListener('click', async () => {
    if (!selectedFile) return;
    setLoading(true);
    hideStatus();

    const formData = new FormData();
    formData.append('file', selectedFile);

    try {
      const res = await fetch('/api/generar-cartas', { method: 'POST', body: formData });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error || err.detail || 'Error desconocido');
      }

      const count = res.headers.get('X-Cartas-Count') || '?';
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'Cartas_Bienvenida.zip';
      a.click();
      URL.revokeObjectURL(url);

      showStatus(`Se generaron ${count} carta(s) correctamente. Descarga iniciada.`, 'success');
      clearFile();
    } catch (err) {
      showStatus(err.message, 'error');
    } finally {
      setLoading(false);
    }
  });

  const scrapeBtn = document.getElementById('scrapeBtn');
  const scrapeBtnText = document.getElementById('scrapeBtnText');
  const competitorsInput = document.getElementById('competitorsInput');
  const scrapeStatusMsg = document.getElementById('scrapeStatusMsg');
  const pricesTableWrap = document.getElementById('pricesTableWrap');

  const DEFAULT_HOTELS = [
    { name: "La Fonda de los Príncipes", url: "https://www.booking.com/hotel/es/la-fonda-de-los-principes.html" },
    { name: "Only YOU Boutique Hotel Madrid", url: "https://www.booking.com/hotel/es/only-you-amp-lounge.html" },
    { name: "Vincci The Mint", url: "https://www.booking.com/hotel/es/vincci-the-mint.html" },
    { name: "Catalonia Las Cortes", url: "https://www.booking.com/hotel/es/catalonia-las-cortes.html" },
    { name: "NH Collection Palacio de Tepa", url: "https://www.booking.com/hotel/es/nh-collection-palacio-de-tepa.html" },
    { name: "Hotel Montera Madrid (Curio)", url: "https://www.booking.com/hotel/es/montera-madrid-curio-collection-by-hilton.html" },
    { name: "UMusic Hotel Madrid", url: "https://www.booking.com/hotel/es/umusic-madrid.html" },
    { name: "Pestana Plaza Mayor Madrid", url: "https://www.booking.com/hotel/es/pestana-plaza-mayor.es.html" },
    { name: "CoolRooms Palacio de Atocha", url: "https://www.booking.com/hotel/es/coolrooms-atocha.es.html" },
    { name: "NH Collection Madrid Gran Vía", url: "https://www.booking.com/hotel/es/nh-collection-madrid-gran-via.html" },
  ];
  const DEFAULT_COMPETITORS = DEFAULT_HOTELS.map((h) => `${h.name}\n${h.url}`).join('\n');

  if (!competitorsInput.value.trim()) {
    competitorsInput.value = DEFAULT_COMPETITORS;
  }

  function showScrapeStatus(msg, type) {
    scrapeStatusMsg.textContent = msg;
    scrapeStatusMsg.className = 'status-msg ' + type;
    scrapeStatusMsg.style.marginTop = '1rem';
  }

  function hideScrapeStatus() {
    scrapeStatusMsg.className = 'status-msg';
    scrapeStatusMsg.style.marginTop = '0';
  }

  function setScrapeLoading(loading) {
    scrapeBtn.disabled = loading;
    if (loading) {
      scrapeBtnText.innerHTML = '<span class="spinner"></span> Consultando…';
    } else {
      scrapeBtnText.textContent = 'Actualizar tabla';
    }
  }

  function parseCompetitors(raw) {
    const lines = raw
      .split('\n')
      .map((l) => l.trim())
      .filter(Boolean);

    const hotels = [];
    let pendingName = '';
    for (const line of lines) {
      if (/^https?:\/\//i.test(line)) {
        if (!pendingName) {
          pendingName = new URL(line).pathname.split('/').filter(Boolean).pop() || 'Hotel';
        }
        hotels.push({ name: pendingName, url: line });
        pendingName = '';
      } else {
        pendingName = line;
      }
    }
    return hotels;
  }

  function escapeHtml(value) {
    return String(value)
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;');
  }

  function formatDateShort(isoDate) {
    const d = new Date(isoDate + 'T00:00:00');
    return d.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit' });
  }

  function formatPrice(value) {
    if (typeof value !== 'number' || Number.isNaN(value)) return '—';
    return new Intl.NumberFormat('es-ES', {
      style: 'currency',
      currency: 'EUR',
      maximumFractionDigits: 0,
    }).format(value);
  }

  const FONDA_NAME = 'La Fonda de los Príncipes';

  function renderPricesTable(matrix) {
    const head = matrix.dates
      .map((d) => `<th>${escapeHtml(formatDateShort(d))}</th>`)
      .join('');

    const sortedIndices = matrix.hotels
      .map((_, i) => i)
      .sort((a, b) => {
        const aFonda = matrix.hotels[a].name === FONDA_NAME ? 0 : 1;
        const bFonda = matrix.hotels[b].name === FONDA_NAME ? 0 : 1;
        return aFonda - bFonda;
      });

    const rows = sortedIndices
      .map((hIdx) => {
        const hotel = matrix.hotels[hIdx];
        const cells = hotel.prices
          .map((entry, dIdx) => {
            const cls = typeof entry.price === 'number' ? '' : ' class="price-empty"';
            const title = entry.error ? ` title="${escapeHtml(entry.error)}"` : '';
            return `<td data-hotel="${hIdx}" data-date="${dIdx}"${cls}${title}>${escapeHtml(formatPrice(entry.price))}</td>`;
          })
          .join('');
        return `<tr><td class="hotel-cell">${escapeHtml(hotel.name)}</td>${cells}</tr>`;
      })
      .join('');

    const competitors = matrix.hotels.filter((h) => h.name !== FONDA_NAME);
    const fonda = matrix.hotels.find((h) => h.name === FONDA_NAME);

    const avgCells = matrix.dates
      .map((_, dIdx) => {
        const prices = competitors
          .map((h) => h.prices[dIdx]?.price)
          .filter((p) => typeof p === 'number');
        if (!prices.length) return '<td class="price-empty">—</td>';
        const avg = prices.reduce((s, v) => s + v, 0) / prices.length;
        return `<td style="font-weight:600">${escapeHtml(formatPrice(avg))}</td>`;
      })
      .join('');

    const diffCells = matrix.dates
      .map((_, dIdx) => {
        const prices = competitors
          .map((h) => h.prices[dIdx]?.price)
          .filter((p) => typeof p === 'number');
        const fondaPrice = fonda?.prices[dIdx]?.price;
        if (!prices.length || typeof fondaPrice !== 'number')
          return '<td class="price-empty">—</td>';
        const avg = prices.reduce((s, v) => s + v, 0) / prices.length;
        const pct = ((fondaPrice - avg) / avg) * 100;
        const sign = pct > 0 ? '+' : '';
        const color = pct > 0 ? 'var(--error)' : 'var(--success)';
        return `<td style="font-weight:600;color:${color}">${sign}${Math.round(pct)}%</td>`;
      })
      .join('');

    const summaryRows =
      `<tr style="border-top:2px solid var(--border)"><td class="hotel-cell" style="font-style:italic">Precio medio competencia</td>${avgCells}</tr>` +
      `<tr><td class="hotel-cell" style="font-style:italic">Fonda vs media</td>${diffCells}</tr>`;

    pricesTableWrap.innerHTML = `
      <table class="prices-table">
        <thead>
          <tr>
            <th>Hotel / Fecha (EUR por noche)</th>
            ${head}
          </tr>
        </thead>
        <tbody>
          ${rows}
          ${summaryRows}
        </tbody>
      </table>
    `;
    pricesTableWrap.style.display = 'block';
  }

  const tipEl = document.createElement('div');
  tipEl.className = 'price-tip';
  tipEl.style.display = 'none';
  document.body.appendChild(tipEl);

  function showTip(cell) {
    const html = cell.dataset.history;
    if (!html) return;
    tipEl.innerHTML = html;
    tipEl.style.display = 'block';
    positionTip(cell);
  }

  function hideTip() {
    tipEl.style.display = 'none';
  }

  function positionTip(cell) {
    const r = cell.getBoundingClientRect();
    const tw = tipEl.offsetWidth;
    const th = tipEl.offsetHeight;
    let left = r.left + (r.width - tw) / 2;
    let top = r.top - th - 6;
    if (top < 4) top = r.bottom + 6;
    if (left < 4) left = 4;
    if (left + tw > window.innerWidth - 4) left = window.innerWidth - tw - 4;
    tipEl.style.left = left + 'px';
    tipEl.style.top = top + 'px';
  }

  pricesTableWrap.addEventListener('mouseenter', (e) => {
    const cell = e.target.closest('td[data-history]');
    if (cell) showTip(cell);
  }, true);

  pricesTableWrap.addEventListener('mouseleave', (e) => {
    const cell = e.target.closest('td[data-history]');
    if (cell) hideTip();
  }, true);

  pricesTableWrap.addEventListener('mouseover', (e) => {
    const cell = e.target.closest('td[data-history]');
    if (cell) showTip(cell);
    else hideTip();
  });

  async function loadAndApplyHistory(matrix) {
    try {
      const hotelNames = matrix.hotels.map((h) => h.name);
      const params = new URLSearchParams({
        hotels: hotelNames.join(','),
        dates: matrix.dates.join(','),
      });
      const res = await fetch(`/api/precios-competencia/historial?${params}`);
      if (!res.ok) return;
      const history = await res.json();

      const cells = pricesTableWrap.querySelectorAll('td[data-hotel][data-date]');
      for (const cell of cells) {
        const hIdx = Number(cell.dataset.hotel);
        const dIdx = Number(cell.dataset.date);
        const hotelName = matrix.hotels[hIdx]?.name;
        const date = matrix.dates[dIdx];
        const entries = history[hotelName]?.[date];
        if (!entries?.length) continue;

        const headerCells = entries
          .map((e) => {
            const d = new Date(e.scraped_at);
            const ds = d.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit' });
            const ts = d.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
            return `<th>${escapeHtml(ds)} ${escapeHtml(ts)}</th>`;
          })
          .join('');

        const valueCells = entries
          .map((e) => {
            const p = e.price != null ? formatPrice(e.price) : '—';
            return `<td>${escapeHtml(p)}</td>`;
          })
          .join('');

        cell.dataset.history =
          `<table><thead><tr>${headerCells}</tr></thead><tbody><tr>${valueCells}</tr></tbody></table>`;
      }
    } catch (err) {
      console.error('Error cargando historial:', err);
    }
  }

  scrapeBtn.addEventListener('click', async () => {
    hideScrapeStatus();
    const hotels = parseCompetitors(competitorsInput.value);
    if (!hotels.length) {
      showScrapeStatus('Introduce al menos un hotel con su URL de Booking.com.', 'error');
      competitorsInput.focus();
      return;
    }

    setScrapeLoading(true);
    try {
      const res = await fetch('/api/precios-competencia/matriz', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          hotels,
          days: 15,
        }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        throw new Error(data.error || 'No se pudo completar la solicitud.');
      }
      renderPricesTable(data);
      loadAndApplyHistory(data);
      const nights = Number(data.stayNights) || 1;
      showScrapeStatus(`Tabla actualizada para ${hotels.length} hoteles y 15 días (estancia de ${nights} noche).`, 'success');
    } catch (err) {
      showScrapeStatus(err.message, 'error');
    } finally {
      setScrapeLoading(false);
    }
  });

  (async function loadLastRun() {
    try {
      const res = await fetch('/api/precios-competencia/ultimo');
      if (!res.ok) return;
      const data = await res.json();
      if (!data || !data.hotels?.length) return;

      renderPricesTable(data);
      loadAndApplyHistory(data);

      const when = new Date(data.scrapedAt);
      const dateStr = when.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit', year: 'numeric' });
      const timeStr = when.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
      showScrapeStatus(`Última consulta: ${dateStr} a las ${timeStr}`, 'success');
    } catch (err) {
      console.error('Error cargando últimos datos:', err);
    }
  })();
</script>

</body>
</html>
